name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command: [check, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Create dummy .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation (${{ matrix.command }})
        run: pnpm ${{ matrix.command }}
